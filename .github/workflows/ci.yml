name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild -project MenuBarCalendar.xcodeproj \
            -scheme MenuBarCalendar \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build

      - name: Run Tests
        run: |
          xcodebuild -project MenuBarCalendar.xcodeproj \
            -scheme MenuBarCalendar \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            test
